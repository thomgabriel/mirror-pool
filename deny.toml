# cargo-deny config (see docs/research/cicd-and-testing.md §6).
# NOTE: the [licenses].allow list is a broad-but-reasonable starter for a
# Solana/Anchor/arkworks dependency tree; run `cargo deny check licenses`
# locally and tune it on the first CI run if a transitive crate uses a
# license not listed here.

[advisories]
version = 2
yanked = "deny"
# Only flag unmaintained crates that are our OWN direct dependencies. Every
# unmaintained advisory in this tree is a deep transitive dep of the Solana SDK
# or the ark-circom proving stack that we cannot drop (ansi_term, atty, paste,
# derivative, fxhash, libsecp256k1, bincode, proc-macro-error, ...).
unmaintained = "workspace"
# All six are transitive advisories in the CLIENT-SIDE proving/tooling tree
# (wasmer, ethers-core -> reqwest, solana-sdk). None is reachable from the
# on-chain custody path (`pool-program` depends on none of them), and none is
# fixable without an upstream bump. Re-audit on every dependency update.
ignore = [
    "RUSTSEC-2024-0344", # curve25519-dalek scalar-sub timing — via wasmer-wasix/solana; not a remote-timing path
    "RUSTSEC-2022-0093", # ed25519-dalek signing oracle — via solana-vote-program; the misuse API is never called
    "RUSTSEC-2026-0098", # webpki URI name constraints — via ethers-core -> reqwest; no TLS is performed
    "RUSTSEC-2026-0099", # webpki wildcard name constraints — via reqwest; no TLS is performed
    "RUSTSEC-2026-0104", # webpki CRL-parse panic — via reqwest; no TLS is performed
    "RUSTSEC-2025-0055", # ANSI-escape log poisoning — client-side logging; no untrusted input is logged to a terminal
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
    # Boost license (permissive; e.g. `ryu`) and the permissive Community Data
    # License Agreement — both from transitive dependencies.
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Intra-workspace crates depend on each other by path (e.g. `sdk = { path = ... }`),
# which resolves to a "*" version. Permit that without weakening the wildcard ban
# on real registry dependencies.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
