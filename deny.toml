# cargo-deny config (see docs/research/cicd-and-testing.md §6).
# NOTE: the [licenses].allow list is a broad-but-reasonable starter for a
# Solana/Anchor/arkworks dependency tree; run `cargo deny check licenses`
# locally and tune it on the first CI run if a transitive crate uses a
# license not listed here.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
