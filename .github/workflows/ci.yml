name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Agave (Solana) CLI version — matches local dev (solana-cli 3.0.1) and must be a
  # real release tag on release.anza.xyz. It provides `cargo-build-sbf`; the actual
  # SBF toolchain (platform-tools v1.54) is pinned in programs/pool-program/Cargo.toml's
  # [package.metadata.solana] and fetched automatically. See docs/research/cicd-and-testing.md.
  SOLANA_VERSION: "3.0.1"

jobs:
  # ---------- 1. Lint / format (fast, host-only — reliable) ----------
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Guard against whole-Pool zero-copy copy
        # `Pool` derives `Copy` (it's `bytemuck::Pod`), so a stray `*x.load()` / by-value
        # `Pool` copy would silently reintroduce the ~4KB SBF-stack bug this branch avoids.
        # Legitimate `AccountLoader` access (`ctx.accounts.pool.load_mut()?`) has no leading
        # `*`, so it doesn't match; only a dereference of the loaded Ref/RefMut does.
        run: |
          if grep -rnE '\*[A-Za-z_][A-Za-z0-9_.]*\.load(_mut|_init)?\(\)' programs/pool-program/src/; then
            echo "::error::whole-Pool copy via *x.load() — use field access through the Ref/RefMut"
            exit 1
          fi

  # ---------- 2. Host unit tests (pure crypto modules — no SBF needed) ----------
  # poseidon/merkle/roots have #[cfg(test)] host tests that run without a built .so.
  # This is the coverage-meaningful layer (see cicd-and-testing.md §3 SBF caveat).
  unit:
    name: host unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p pool-program --lib --locked

  # ---------- 3. SBF build + non-proof LiteSVM integration tests ----------
  # Builds the SBF program with `cargo build-sbf` (which fetches platform-tools v1.54
  # via the [package.metadata.solana] pin) and runs the LiteSVM integration tests that
  # don't need a Groth16 proof (deposit/initialize_pool/scaffold — they only load the
  # built .so). We install the Agave toolchain directly from release.anza.xyz rather
  # than a third-party setup action; the tests hand-build instructions (no IDL), so the
  # Anchor CLI is unnecessary. If SOLANA_VERSION drifts from the manifest, adjust it here.
  # The proof-based integration tests (tests/withdraw.rs, tests/verifier.rs) need the
  # circom + ptau ZK toolchain too, so they run in the `zk-tests` job instead — this job
  # stays green without provisioning that toolchain.
  build-test:
    name: build (sbf) + non-proof litesvm integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Solana (Agave) toolchain
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
      - name: Build SBF program (cargo build-sbf)
        # LiteSVM loads target/deploy/pool_program.so directly; the tests hand-build
        # instructions (no IDL), so cargo-build-sbf is sufficient — no Anchor CLI.
        # platform-tools v1.54 is auto-fetched via [package.metadata.solana].
        run: cargo build-sbf --manifest-path programs/pool-program/Cargo.toml
      - name: Non-proof test suite (unit + deposit/initialize_pool/scaffold LiteSVM integration)
        run: cargo test -p pool-program --lib --test deposit --test initialize_pool --test scaffold --locked

  # ---------- 4. Circuit tests + VK drift guard ----------
  # Regenerates circuits/build/verification_key.json via circuits/scripts/setup.sh
  # (needs circom + snarkjs/node + the pot14 ptau fetched below), then byte-compares
  # the embedded on-chain VK (programs/pool-program/src/vk.rs) against what
  # crates/vk-gen would regenerate from it.
  # The circom test suite runs here too: it needs the same circom + compiled circuit and
  # does NOT link wasmer, so unlike zk-tests it runs on Linux. It is the gate on the
  # circom<->on-chain Poseidon/Merkle byte-parity that every proof's meaning rests on.
  check-vk:
    name: circuit tests + check-vk (verifier-key drift guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: circuits/package-lock.json
      - uses: ./.github/actions/install-circom
      - name: npm ci (circuits)
        working-directory: circuits
        run: npm ci
      - uses: ./.github/actions/fetch-ptau
      - name: Regenerate verification_key.json
        run: bash circuits/scripts/setup.sh
      - name: Circuit tests (Poseidon/Merkle parity vs on-chain + withdraw membership/nullifier)
        working-directory: circuits
        run: npm test
      - name: Byte-compare embedded VK against regenerated verification_key.json
        run: cargo run -p vk-gen -- --check

  # ---------- 4b. ZK proof-based tests (circom + ptau + sbf build) ----------
  # macOS is the ONLY runner this job can use — forced by two constraints intersecting:
  #   1. Needs ARM. These binaries link `wasmer` (via ark-circom's witness calculator,
  #      whose 0.5 pin we cannot change), which references the PLAIN `__rust_probestack`.
  #      Rust exports that intrinsic only v0-mangled (`__rustc::__rust_probestack`), so on
  #      x86_64 the reference is undefined and the link fails — no linker flag and no
  #      toolchain pin fixes it (rust-lang/rust#142612, upstream won't-fix). It is an
  #      x86-ONLY intrinsic, so on ARM it is neither provided nor referenced: link succeeds.
  #   2. Needs an Agave CLI (for `cargo-build-sbf`). Anza publishes no aarch64-linux build
  #      (release.anza.xyz .../solana-release-aarch64-unknown-linux-gnu.tar.bz2 -> 404), so
  #      ubuntu-*-arm cannot install the toolchain at all.
  #   ARM AND an Agave build intersect only at aarch64-apple-darwin => macos-latest.
  # It's also the one job provisioning the full ZK toolchain (circom + pot14 ptau) AND
  # building the SBF program, since the proof tests need a real Groth16 proof plus the
  # on-chain program via LiteSVM. Durable fix: drop wasmer for a native witness calculator
  # — that removes constraint 1 and lets this job return to x86 Linux.
  zk-tests:
    name: zk proof tests (commit/execute/cancel/verifier/prover/sdk)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Solana (Agave) toolchain
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-circom
      - name: npm ci (circuits)
        working-directory: circuits
        run: npm ci
      - uses: ./.github/actions/fetch-ptau
      - name: Build SBF program (cargo build-sbf)
        run: cargo build-sbf --manifest-path programs/pool-program/Cargo.toml
      - name: Generate circuit build artifacts (circom compile + trusted setup)
        run: bash circuits/scripts/setup.sh
      - name: Proof-based pool-program integration tests
        run: cargo test -p pool-program --test commit_intent --test execute_round --test cancel_intent --test verifier --locked
      - name: Prover unit + integration tests
        run: cargo test -p prover --locked
      - name: SDK unit + e2e round-trip tests
        run: cargo test -p sdk --locked

  # ---------- 5. Security / supply chain ----------
  supply-chain:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
