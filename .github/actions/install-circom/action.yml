name: install-circom
description: >
  Install the circom 2.1.6 compiler (a Rust binary, not an npm package),
  pinned per docs/superpowers/plans/2026-07-15-circuits.md, cached across
  runs since it's a slow `cargo install --git` build.
runs:
  using: composite
  steps:
    - name: Cache circom binary
      id: cache-circom
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cargo/bin/circom
        key: circom-v2.1.6-${{ runner.os }}
    - name: Install circom 2.1.6
      if: steps.cache-circom.outputs.cache-hit != 'true'
      shell: bash
      run: cargo install --git https://github.com/iden3/circom --tag v2.1.6 --locked
